name: Update Daily LeetCode & GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for pushing commits back to the repo

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run Stats Update Script
        run: python .github/scripts/update_stats.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/portfolio.json
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update LeetCode and GitHub activity statistics [skip ci]"
            git push
            echo "Changes committed and pushed."
          else
            echo "No updates detected in statistics."
          fi
