<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost in Space | Nihar GNV</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: var(--bg-primary);
    }
    #star-field {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .error-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 24px;
    }
    .error-card {
      max-width: 500px;
      width: 100%;
      padding: 60px 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      position: relative;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                  0 0 40px rgba(99, 102, 241, 0.1);
      animation: card-glow 4s ease-in-out infinite alternate;
    }
    @keyframes card-glow {
      0% { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(99, 102, 241, 0.1); }
      100% { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 60px rgba(99, 102, 241, 0.25); }
    }
    .astronaut-wrapper {
      margin: 0 auto 30px;
      width: 120px;
      height: 120px;
      font-size: 5rem;
      color: var(--accent-color);
      animation: float 6s ease-in-out infinite;
      filter: drop-shadow(0 10px 15px rgba(99, 102, 241, 0.3));
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(8deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .error-code {
      font-family: var(--font-display);
      font-size: 7.5rem;
      font-weight: 900;
      line-height: 1;
      margin: 0 0 16px;
      letter-spacing: -2px;
      animation: breathe 3s ease-in-out infinite alternate;
      background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #4338ca 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 5px 10px rgba(99, 102, 241, 0.2));
    }
    @keyframes breathe {
      0% { transform: scale(1); filter: drop-shadow(0 5px 10px rgba(99, 102, 241, 0.2)); }
      100% { transform: scale(1.03); filter: drop-shadow(0 10px 25px rgba(99, 102, 241, 0.4)); }
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 16px;
      color: var(--text-primary);
    }
    .error-message {
      color: var(--text-secondary);
      margin-bottom: 36px;
      line-height: 1.6;
      font-size: 1rem;
    }
    .timer-container {
      margin-bottom: 36px;
      text-align: left;
    }
    .timer-text {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-color) 0%, #a5b4fc 100%);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <!-- Star Particle Canvas -->
  <canvas id="star-field"></canvas>

  <!-- Ambient Glow Blocks -->
  <div class="ambient-glow" style="top: 20%; left: 15%; width: 300px; height: 300px; opacity: 0.3;"></div>
  <div class="ambient-glow" style="bottom: 15%; right: 15%; width: 400px; height: 400px; opacity: 0.25;"></div>

  <main class="error-wrapper">
    <div class="glass-card error-card" data-aos="zoom-in">
      <div class="astronaut-wrapper">
        <i class="fas fa-user-astronaut"></i>
      </div>
      <div class="error-code">404</div>
      <h1 class="error-title">Lost in Space</h1>
      <p class="error-message">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
      
      <!-- Progress Bar Timer -->
      <div class="timer-container">
        <div class="timer-text">
          <span>Auto-navigation initiated</span>
          <span><span id="countdown">10</span>s</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
      </div>

      <div style="display: flex; gap: 16px; justify-content: center;">
        <a href="index.html" class="btn btn-primary" style="padding: 12px 28px; font-weight: 600;"><i class="fas fa-home"></i> Go Home</a>
        <a href="index.html#projects" class="btn btn-secondary" style="padding: 12px 28px; font-weight: 600;"><i class="fas fa-th-large"></i> Projects</a>
      </div>
    </div>
  </main>

  <script>
    // 1. Starfield Particles Animation
    const canvas = document.getElementById('star-field');
    const ctx = canvas.getContext('2d');
    
    let stars = [];
    const starCount = 80;
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    class Star {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = (Math.random() - 0.5) * 0.2;
        this.speedY = -Math.random() * 0.4 - 0.1; // rise up
        this.opacity = Math.random();
        this.fadeSpeed = Math.random() * 0.01 + 0.005;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        
        // Twinkle
        this.opacity += this.fadeSpeed;
        if (this.opacity > 1 || this.opacity < 0) {
          this.fadeSpeed = -this.fadeSpeed;
        }
        
        // Loop boundary
        if (this.y < 0 || this.x < 0 || this.x > canvas.width) {
          this.reset();
          this.y = canvas.height;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, this.opacity))})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    
    for (let i = 0; i < starCount; i++) {
      stars.push(new Star());
    }
    
    // Slight mouse parallax
    let mouseX = 0, mouseY = 0;
    window.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX - window.innerWidth / 2) * 0.05;
      mouseY = (e.clientY - window.innerHeight / 2) * 0.05;
    });
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Starfield
      ctx.save();
      ctx.translate(-mouseX, -mouseY);
      stars.forEach(star => {
        star.update();
        star.draw();
      });
      ctx.restore();
      
      requestAnimationFrame(animate);
    }
    animate();

    // 2. Countdown and Progress Bar Redirect
    let count = 10;
    const maxCount = 10;
    const countdownEl = document.getElementById('countdown');
    const progressBar = document.getElementById('progress-bar');
    
    const interval = setInterval(() => {
      count--;
      if (countdownEl) countdownEl.textContent = count;
      
      const pct = (count / maxCount) * 100;
      if (progressBar) progressBar.style.width = `${pct}%`;
      
      if (count <= 0) {
        clearInterval(interval);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>
</body>
</html>
